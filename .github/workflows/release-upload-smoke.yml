          EOF

      - name: Build smoke crate
        run: |
          python -c "import sys; print(sys.executable)"
          python -c "import sys; print(sys.version)"
          cargo build --manifest-path smoke-msys2/Cargo.toml --target ${{ matrix.target }} -vv
