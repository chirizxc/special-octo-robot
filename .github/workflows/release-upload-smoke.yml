name: yaml-anchor-test

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  # Dummy key used only to define a YAML anchor.
  _anchor: &big-condition >-
    ${{
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      startsWith(github.ref, 'refs/tags/') ||
      startsWith(github.head_ref, 'feature/') ||
      startsWith(github.head_ref, 'fix/') ||
      contains(github.actor, 'bot') ||
      contains(github.repository, '/') ||
      github.run_attempt >= 1
    }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: First use
        env:
          VALUE: *big-condition
        run: |
          echo "First: $VALUE"

      - name: Second use
        env:
          VALUE: *big-condition
        run: |
          echo "Second: $VALUE"

      - name: Third use
        env:
          VALUE: *big-condition
        run: |
          echo "Third: $VALUE"

      - name: Verify
        env:
          VALUE: *big-condition
        run: |
          echo "Resolved to: $VALUE"
          test "$VALUE" = "true" || test "$VALUE" = "false"
