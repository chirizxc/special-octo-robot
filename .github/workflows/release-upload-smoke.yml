      - name: "Run toml_rs playwright test"
        shell: bash
        run: |
          uv venv .venv --python 3.13

          uv pip install maturin playwright

          git clone --branch vbbb https://github.com/lava-sh/toml-rs.git toml_rs_repo
          cd toml_rs_repo

          uv run maturin build --out wheel --features mimalloc

          uv pip install wheel/*.whl

          cd ..

          cat > issues_229.py <<'PY'
          import asyncio
          from playwright.async_api import async_playwright
          import toml_rs

          async def main() -> None:
              playwright = await async_playwright().start()
              await playwright.stop()

          if __name__ == "__main__":
              asyncio.run(main())
          PY

          uv run python issues_229.py
