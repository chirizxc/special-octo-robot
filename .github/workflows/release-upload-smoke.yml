name: "Some tests"

on:
  push:
  workflow_dispatch:

jobs:
  toml_rs_issues_229:
    runs-on: macos-latest

    steps:
      - name: "Install uv"
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: "Run toml_rs playwright test"
        run: |
          uv venv .venv --python 3.13
          source .venv/bin/activate

          uv pip install toml_rs playwright

          cat > issues_229.py <<'PY'
          import asyncio
          from playwright.async_api import async_playwright
          # import toml_rs

          async def main() -> None:
              playwright = await async_playwright().start()
              await playwright.stop()

          if __name__ == "__main__":
              asyncio.run(main())
          PY

          python issues_229.py
